<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Crazy Kittens</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="res/icons/logo.ico">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="res/images/logo.png" alt="Crazy Kittens logo">
      Crazy Kittens
    </a>
    <div class="navbar-right">
      <div class="lang-select-wrap">
        <select class="lang-select" aria-label="Language"></select>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <ul class="navbar-links" id="navLinks">
      <li><a href="index.html" data-i18n="nav.home">Home</a></li>
      <li><a href="erika/" data-i18n="nav.erika">Project Erika</a></li>
      <li><a href="studio/" data-i18n="nav.studio">Studio</a></li>
      <li><a href="team/" data-i18n="nav.team">Team</a></li>
      <li><a href="donate/" data-i18n="nav.donate">Donate</a></li>
      <li><a href="index.html#socials" data-i18n="nav.socials">Socials</a></li>
    </ul>
  </nav>

  <main class="error-page">
    <div class="error-code">404</div>
    <h2 data-i18n="404.h2">Page not found 🐱</h2>
    <p data-i18n="404.p">Looks like this page wandered off and got lost in the yarn pile.</p>
    <a href="index.html" class="btn" data-i18n="404.btn">🏠 Back to Home</a>
  </main>

  <footer class="footer">
    <div class="footer-bottom" style="max-width:100%;">
      <p data-i18n="footer.copy">© Crazy Kittens 2026. All rights reserved.</p>
      <div class="footer-paws">🐾🐾🐾</div>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script>
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    toggle.addEventListener('click', () => { toggle.classList.toggle('open'); links.classList.toggle('open'); });
    links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { toggle.classList.remove('open'); links.classList.remove('open'); }));
  </script>
</body>
</html>
